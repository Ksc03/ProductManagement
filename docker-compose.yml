version: '3.8'

services:

  productmanagement.api:
    container_name: productmanagement-api

    build:
      context: .
      dockerfile: ProductManagement.API/Dockerfile

    ports:
      - "5000:8080"

    environment:
      ASPNETCORE_ENVIRONMENT: Development

      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=ProductManagementDb;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True;Encrypt=False"

    depends_on:
      - sqlserver

    restart: unless-stopped

  sqlserver:
    container_name: productmanagement-sqlserver

    image: mcr.microsoft.com/mssql/server:2022-latest

    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourStrong@Passw0rd"

    ports:
      - "1433:1433"

    volumes:
      - sql_data:/var/opt/mssql

    restart: unless-stopped

volumes:
  sql_data: